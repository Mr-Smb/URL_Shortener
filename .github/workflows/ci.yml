name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            workdir: frontend
          - name: shortener-service
            workdir: shortener-service
          - name: redirect-service
            workdir: redirect-service
          - name: analytics-service
            workdir: analytics-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            shortener-service/package-lock.json
            redirect-service/package-lock.json
            analytics-service/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.workdir }}
        run: npm install

      - name: Build frontend
        if: matrix.name == 'frontend'
        working-directory: frontend
        run: npm run build